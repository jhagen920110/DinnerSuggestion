<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>오늘 뭐 먹지?</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Gowun+Dodum&family=Gaegu:wght@400;700&family=Do+Hyeon&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/x-icon" href="./images/favicon.ico" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="images/apple-touch-icon.png" />
  <meta name="theme-color" content="#4f46e5" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="뭐먹지" />
</head>
<body>
  <!-- Splash Screen -->
  <div id="splashScreen" class="splash">
    <div class="splash-inner">
      <div class="splash-foods">
        <div class="splash-row"><span>🍚</span><span>🥘</span><span>🍜</span><span>🥟</span><span>🍣</span><span>🍲</span></div>
        <div class="splash-row offset"><span>🥩</span><span>🍝</span><span>🍛</span><span>🥗</span><span>🍱</span><span>🥧</span></div>
        <div class="splash-row"><span>🍖</span><span>🫕</span><span>🥘</span><span>🍤</span><span>🥙</span><span>🍕</span></div>
        <div class="splash-row offset"><span>🧆</span><span>🍳</span><span>🫔</span><span>🥪</span><span>🍔</span><span>🌮</span></div>
        <div class="splash-row"><span>🥡</span><span>🍗</span><span>🥣</span><span>🍰</span><span>🧁</span><span>🥗</span></div>
        <div class="splash-row offset"><span>🫕</span><span>🍛</span><span>🍣</span><span>🍚</span><span>🥟</span><span>🍝</span></div>
        <div class="splash-row"><span>🍜</span><span>🥩</span><span>🍲</span><span>🍱</span><span>🥘</span><span>🍤</span></div>
        <div class="splash-row offset"><span>🍳</span><span>🧆</span><span>🥙</span><span>🍕</span><span>🫔</span><span>🥪</span></div>
      </div>
      <div class="splash-overlay">
        <h1 class="splash-title">🍲 오늘 뭐 먹지?</h1>
        <p class="splash-sub"><span class="splash-bounce" style="--i:0">메</span><span class="splash-bounce" style="--i:1">뉴</span><span class="splash-bounce" style="--i:2">&nbsp;</span><span class="splash-bounce" style="--i:3">준</span><span class="splash-bounce" style="--i:4">비</span><span class="splash-bounce" style="--i:5">&nbsp;</span><span class="splash-bounce" style="--i:6">중</span> <span id="splashFoodIcon">🍳</span></p>
      </div>
    </div>
  </div>
  <script>
    (function(){
      var icons = ['🍳','🥘','🍜','🍲','🥟','🍣','🍛','🍝','🥩','🍤','🍕','🌮','🍔','🥗','🧆','🫕'];
      var i = 0;
      var el = document.getElementById('splashFoodIcon');
      if (el) setInterval(function(){ i = (i+1) % icons.length; el.textContent = icons[i]; }, 400);
    })();
  </script>

  <header id="topBar" class="top-bar">
    <h1 id="topBarTitle" class="top-bar-title">저녁 메뉴 추천</h1>
    <button id="accountBtn" type="button" class="account-btn" aria-label="계정">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    </button>
  </header>

  <main class="app-shell">

    <nav class="tab-bar">
      <button class="tab-btn active" data-page="suggestions">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
        <span>추천</span>
      </button>
      <button class="tab-btn" data-page="pantry">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        <span>식료품</span>
      </button>
      <button class="tab-btn" data-page="meals">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19h16"/><path d="M4 15h16"/><path d="M12 3C7 3 4 7 4 11h16c0-4-3-8-8-8z"/></svg>
        <span>레시피</span>
      </button>
      <button class="tab-btn" id="calendarFab" data-page="calendar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><rect x="7" y="14" width="3" height="3" rx="0.5"/><rect x="14" y="14" width="3" height="3" rx="0.5"/></svg>
        <span>캘린더</span>
      </button>
    </nav>

    <!-- PAGE: Pantry -->
    <div id="page-pantry" class="page">
      <section class="card pantry-card">
        <div id="pantryStatus" class="status-text" aria-live="polite" style="margin-bottom:8px;"></div>

        <div id="pantryContent">
          <div id="ingredientFormWrap" class="ingredient-form" hidden>
            <div class="form-grid">
              <div class="field field-name">
                <label for="ingredientName">재료명</label>
                <input id="ingredientName" type="text" placeholder="예: 김치, 양파, 계란" autocomplete="off" />
              </div>
            </div>

            <div class="form-actions">
              <button id="saveButton" type="button" class="primary-btn">재료 추가</button>
            </div>
          </div>

          <div class="filters-wrap">
            <div class="filters-row">
              <button id="toggleFiltersButton" type="button" class="filters-toggle filters-toggle-sm">
                Filters <span id="filtersCaret">▸</span>
              </button>
              <button id="showIngredientFormBtn" type="button" class="primary-btn primary-btn-sm">+ 재료 추가</button>
            </div>

            <div id="filtersContent" class="filters-panel" hidden>
              <div class="filter-grid simple-filter-grid">
                <div class="field">
                  <label for="filterTypeSelect">종류</label>
                  <select id="filterTypeSelect">
                    <option value="all">전체</option>
                    <option value="야채">야채</option>
                    <option value="탄수화물">탄수화물</option>
                    <option value="고기/단백질">고기/단백질</option>
                    <option value="유제품">유제품</option>
                    <option value="과일">과일</option>
                    <option value="소스/조미료">소스/조미료</option>
                    <option value="냉동식품">냉동식품</option>
                    <option value="기타">기타</option>
                  </select>
                </div>

                <div class="field">
                  <label for="filterSearch">검색</label>
                  <input id="filterSearch" type="text" placeholder="재료 검색" />
                </div>
              </div>

              <div class="filters-actions">
                <button type="button" id="clearFiltersButton" class="secondary-btn">초기화</button>
              </div>
            </div>
          </div>

          <div class="expand-all-wrap">
            <button id="toggleAllPantry" type="button" class="expand-all-btn">리스트 모두 펼치기</button>
          </div>

          <div id="ingredientsSections"></div>
        </div>
      </section>
    </div>

    <!-- PAGE: Meals -->
    <div id="page-meals" class="page">
      <section class="card">
        <div id="mealStatus" class="status-text" aria-live="polite" style="margin-bottom:8px;"></div>

        <div id="mealFormWrap" class="meal-form-wrap" hidden>
          <div class="ingredient-form">
            <div class="meal-form-grid">
              <div class="field">
                <label for="mealName">요리 이름</label>
                <input id="mealName" type="text" placeholder="예: 김치찌개" autocomplete="off" />
              </div>

              <div class="field">
                <label for="mealCuisine">종류</label>
                <select id="mealCuisine">
                  <option value="한식" selected>한식</option>
                  <option value="양식">양식</option>
                  <option value="중식">중식</option>
                  <option value="일식">일식</option>
                  <option value="분식">분식</option>
                  <option value="기타">기타</option>
                </select>
              </div>

              <div class="field">
                <label for="mealDifficulty">난이도</label>
                <select id="mealDifficulty">
                  <option value="쉬움">쉬움</option>
                  <option value="보통" selected>보통</option>
                  <option value="어려움">어려움</option>
                </select>
              </div>

              <div class="field">
                <label for="mealCookTime">조리 시간</label>
                <select id="mealCookTime">
                  <option value="">선택</option>
                  <option value="15분">15분</option>
                  <option value="30분">30분</option>
                  <option value="45분">45분</option>
                  <option value="60분">60분</option>
                  <option value="60분+">60분+</option>
                </select>
              </div>

              <div class="field field-wide">
                <label for="mealIngredients">재료 (쉼표로 구분)</label>
                <input id="mealIngredients" type="text" placeholder="예: 김치, 돼지고기, 두부, 대파" />
              </div>

              <div class="field field-wide">
                <label>태그 (선택)</label>
                <div id="mealTagsChips" class="tag-chips-wrap"></div>
                <div class="tag-manage-row">
                  <button id="manageTagsBtn" type="button" class="secondary-btn small">태그 관리</button>
                </div>
              </div>

              <div class="field field-wide">
                <label for="mealRecipeUrl">레시피 URL (선택)</label>
                <input id="mealRecipeUrl" type="url" placeholder="https://..." />
              </div>

              <div class="field field-wide">
                <label for="mealImageUrl">이미지 URL (선택)</label>
                <input id="mealImageUrl" type="url" placeholder="https://..." />
                <div id="mealImagePreview" class="meal-image-preview" hidden>
                  <img id="mealImagePreviewImg" alt="미리보기" />
                </div>
              </div>
            </div>

            <div class="form-actions">
              <label class="today-meal-check">
                <input id="mealLogToday" type="checkbox" />
                오늘의 식사로 기록
              </label>
              <button id="saveMealBtn" type="button" class="primary-btn">저장</button>
              <button id="cancelMealBtn" type="button" class="secondary-btn">취소</button>
            </div>
          </div>
        </div>

        <div id="mealFiltersWrap" class="filters-wrap">
          <div class="filters-row">
            <button id="toggleMealFiltersBtn" type="button" class="filters-toggle filters-toggle-sm">
              Filters <span id="mealFiltersCaret">▸</span>
            </button>
            <button id="showMealFormBtn" type="button" class="primary-btn primary-btn-sm">+ 레시피 추가</button>
          </div>

          <div id="mealFiltersContent" class="filters-panel" hidden>
            <div class="filter-grid simple-filter-grid">
              <div class="field">
                <label for="mealCuisineFilter">종류</label>
                <select id="mealCuisineFilter">
                  <option value="all">전체</option>
                  <option value="한식">한식</option>
                  <option value="양식">양식</option>
                  <option value="중식">중식</option>
                  <option value="일식">일식</option>
                  <option value="분식">분식</option>
                  <option value="기타">기타</option>
                </select>
              </div>

              <div class="field">
                <label for="mealSearchInput">검색</label>
                <input id="mealSearchInput" type="text" placeholder="레시피 검색" autocomplete="off" />
              </div>
            </div>

            <div class="filters-actions">
              <button type="button" id="clearMealFiltersBtn" class="secondary-btn">초기화</button>
            </div>
          </div>
        </div>

        <div class="expand-all-wrap">
          <button id="toggleAllMeals" type="button" class="expand-all-btn">리스트 모두 펼치기</button>
        </div>

        <div id="mealsContainer"></div>

        <!-- Tag Management Modal -->
        <div id="tagModal" class="modal-overlay" hidden>
          <div class="modal-content">
            <h3>태그 관리</h3>
            <div id="tagModalList" class="tag-modal-list"></div>
            <div class="tag-add-row">
              <input id="newTagInput" type="text" placeholder="새 태그 이름" />
              <button id="addTagBtn" type="button" class="primary-btn small">추가</button>
            </div>
            <div class="form-actions">
              <button id="closeTagModalBtn" type="button" class="secondary-btn">닫기</button>
            </div>
          </div>
        </div>
      </section>

      <section class="card">
        <div class="section-head-actions">
          <h3 style="margin:0;font-size:1rem;white-space:nowrap;">🚫 추천 제외 목록</h3>
          <button id="toggleBlockedBtn" type="button" class="filters-toggle" style="padding:6px 10px;font-size:0.78rem;">펼치기 <span id="blockedCaret">▸</span></button>
        </div>
        <div id="blockedSection" hidden>
          <p class="blocked-desc">아래 목록에 있는 요리는 AI 추천에서 제외됩니다.</p>
          <div class="blocked-add-row">
            <input id="blockedNameInput" type="text" placeholder="제외할 요리 이름" autocomplete="off" />
            <button id="addBlockedBtn" type="button" class="primary-btn" style="padding:6px 10px;white-space:nowrap;flex:0 0 auto;font-size:0.8rem;">추가</button>
          </div>
          <div id="blockedList" class="blocked-list"></div>
        </div>
      </section>
    </div>

    <!-- PAGE: Suggestions -->
    <div id="page-suggestions" class="page active">
      <section class="card suggestion-card">
        <div class="page-actions">
          <button id="suggestButton" type="button" class="primary-btn">오늘 뭐 먹지?</button>
        </div>

        <div id="suggestions"></div>
      </section>
    </div>

    <!-- PAGE: Account -->
    <div id="page-account" class="page">
      <section class="card account-card">
        <h2 class="account-heading">계정 정보</h2>
        <div class="account-row">
          <span class="account-label">이메일</span>
          <span id="accountEmail" class="account-value">-</span>
        </div>
        <div class="account-row">
          <span class="account-label">글꼴 스타일</span>
          <div id="fontThemePicker" class="font-theme-picker">
            <button class="font-theme-btn" data-theme="clean" title="깔끔한">
              <span class="font-theme-preview" style="font-family:'Jua',sans-serif">가</span>
              <span class="font-theme-name">깔끔한</span>
            </button>
            <button class="font-theme-btn" data-theme="handwritten" title="손글씨">
              <span class="font-theme-preview" style="font-family:'Gaegu',cursive">가</span>
              <span class="font-theme-name">손글씨</span>
            </button>
            <button class="font-theme-btn" data-theme="modern" title="모던">
              <span class="font-theme-preview" style="font-family:'Do Hyeon',sans-serif">가</span>
              <span class="font-theme-name">모던</span>
            </button>
          </div>
        </div>
        <div class="account-actions">
        </div>
      </section>
    </div>
  </main>

  <!-- Calendar Overlay -->
  <div id="calendarOverlay" class="calendar-overlay" hidden>
    <div class="calendar-overlay-content">
      <div class="calendar-overlay-header">
        <h2><svg class="cal-header-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><rect x="7" y="14" width="3" height="3" rx="0.5"/><rect x="14" y="14" width="3" height="3" rx="0.5"/></svg> 식사 캘린더</h2>
        <button id="calCloseBtn" type="button" class="icon-button" aria-label="닫기">✕</button>
      </div>
      <div class="calendar-overlay-body">
      <section class="cal-section">
        <div class="calendar-header">
          <button id="calPrevMonth" type="button" class="icon-button" aria-label="이전 달">◀</button>
          <h3 id="calTitle"></h3>
          <button id="calNextMonth" type="button" class="icon-button" aria-label="다음 달">▶</button>
          <button id="calToday" type="button" class="secondary-btn small">오늘</button>
        </div>
        <div id="calendarGrid" class="calendar-grid"></div>
      </section>

      <section id="calDayDetail" class="cal-section" hidden>
        <div class="section-head">
          <h3 id="calDayTitle"></h3>
          <button id="calAddMealBtn" type="button" class="primary-btn small">+ 식사 추가</button>
        </div>
        <div id="calAddMealForm" hidden>
          <div class="cal-add-form">
            <div id="calRecipeList" class="cal-recipe-list"></div>
            <button id="calManualToggle" type="button" class="cal-manual-divider">직접 입력 ▸</button>
            <div id="calManualFields" hidden>
              <input id="calMealName" type="text" placeholder="요리 이름" autocomplete="off" />
              <input id="calMealImageUrl" type="url" placeholder="이미지 URL (선택)" />
              <div class="form-actions">
                <button id="calSaveMealBtn" type="button" class="primary-btn small">저장</button>
                <button id="calCancelMealBtn" type="button" class="secondary-btn small">취소</button>
              </div>
            </div>
          </div>
        </div>
        <div id="calDayMeals"></div>
      </section>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
