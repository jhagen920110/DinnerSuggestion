<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🍙 오늘 뭐 먹지?</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app-shell">
    <header class="hero">
      <div class="hero-copy">
        <h1 class="app-title">🍙 오늘 뭐 먹지?</h1>
      </div>
    </header>

    <section class="card pantry-card">
      <div class="section-head">
        <div>
          <h2>🥕 Pantry</h2>
          <p class="section-subtitle">Pantry 정리</p>
        </div>
        <div id="pantryStatus" class="status-text" aria-live="polite"></div>
      </div>

      <div class="ingredient-form">
        <div class="form-grid">
          <div class="field field-name">
            <label for="ingredientName">재료명</label>
            <input id="ingredientName" type="text" placeholder="예: 김치, 양파, 계란" />
          </div>

          <div class="field">
            <label for="ingredientStockLevel">수량</label>
            <select id="ingredientStockLevel">
              <option value="보통" selected>보통</option>
              <option value="적음">적음</option>
              <option value="많음">많음</option>
              <option value="없음">없음</option>
            </select>
          </div>

        <div class="form-actions">
          <button id="saveButton" type="button" class="primary-btn">재료 추가</button>
          <button id="cancelEditButton" type="button" class="secondary-btn" hidden>취소</button>
        </div>
      </div>

      <div class="filters-wrap">
        <button id="toggleFiltersButton" type="button" class="filters-toggle">
          Filters <span id="filtersCaret">▸</span>
        </button>

        <div id="filtersContent" class="filters-panel" hidden>
          <div class="filter-grid">
            <div class="field">
              <label for="filterSearch">검색</label>
              <input id="filterSearch" type="text" placeholder="재료 검색" />
            </div>

            <div class="field">
              <label>수량</label>
              <div class="radio-group">
                <label><input type="radio" name="stockFilter" value="all" checked><span>전체</span></label>
                <label><input type="radio" name="stockFilter" value="low"><span>적음</span></label>
                <label><input type="radio" name="stockFilter" value="some"><span>보통</span></label>
                <label><input type="radio" name="stockFilter" value="plenty"><span>많음</span></label>
                <label><input type="radio" name="stockFilter" value="out"><span>없음</span></label>
              </div>
            </div>

            <div class="field">
              <label>정렬</label>
              <div class="radio-group">
                <label><input type="radio" name="sortFilter" value="korean" checked><span>가나다순</span></label>
                <label><input type="radio" name="sortFilter" value="abc"><span>ABC순</span></label>
                <label><input type="radio" name="sortFilter" value="recent"><span>최근추가</span></label>
              </div>
            </div>

            <div class="field">
              <label>종류</label>
              <div class="radio-group">
                <label><input type="radio" name="typeFilter" value="all" checked><span>전체</span></label>
                <label><input type="radio" name="typeFilter" value="vegetable"><span>야채</span></label>
                <label><input type="radio" name="typeFilter" value="carb"><span>탄수화물</span></label>
                <label><input type="radio" name="typeFilter" value="protein"><span>고기/단백질</span></label>
                <label><input type="radio" name="typeFilter" value="dairy"><span>유제품</span></label>
                <label><input type="radio" name="typeFilter" value="fruit"><span>과일</span></label>
                <label><input type="radio" name="typeFilter" value="sauce"><span>소스/조미료</span></label>
                <label><input type="radio" name="typeFilter" value="frozen"><span>냉동식품</span></label>
                <label><input type="radio" name="typeFilter" value="other"><span>기타</span></label>
              </div>
            </div>
          </div>

          <div class="filters-actions">
            <button id="clearFiltersButton" type="button" class="secondary-btn">초기화</button>
          </div>
        </div>
      </div>

      <div id="pantrySummary" class="pantry-summary"></div>
      <div id="ingredientsSections"></div>
    </section>

    <section class="card suggestion-card">
      <div class="section-head">
        <div>
          <h2>🍽️ 저녁 메뉴 추천</h2>
        </div>
        <button id="suggestButton" type="button" class="primary-btn">추천 받기</button>
      </div>

      <div id="suggestions"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
